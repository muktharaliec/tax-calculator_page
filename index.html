<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Calculator (5%)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative; /* Allows positioning the counter relative to the screen */
        }
        /* Top Right Visit Counter Style */
        .visit-counter {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ffffff;
            padding: 8px 14px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            font-size: 13px;
            font-weight: 600;
            color: #555;
            border: 1px solid #e0e0e0;
        }
        .counter-num {
            color: #2196F3;
        }
        .calculator-card {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
        }
        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
            font-size: 22px;
        }
        .input-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #666;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #2196F3;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #1e88e5;
        }
        .results {
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 15px;
        }
        .result-val {
            font-weight: bold;
            font-family: monospace; /* Kept clean so 4 decimal places line up nicely */
            font-size: 16px;
        }
        .total-ex { color: #4CAF50; }
        .unit-ex { color: #FF9800; }
    </style>
</head>
<body>

<div class="visit-counter">
    Visits: <span id="visitCount" class="counter-num">0</span>
</div>

<div class="calculator-card">
    <h2>Tax Calculator (5%)</h2>
    
    <div class="input-group">
        <label for="totalIncTax">Total Price (Incl. Tax)</label>
        <input type="number" id="totalIncTax" step="any" placeholder="0.0000">
    </div>

    <div class="input-group">
        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" value="1" step="any">
    </div>

    <button onclick="calculatePrice()">Calculate</button>

    <div class="results" id="resultsSection" style="display: none;">
        <div class="result-item">
            <span>Total Price (Excl. Tax):</span>
            <span id="resTotal" class="result-val total-ex">0.0000</span>
        </div>
        <div class="result-item">
            <span>Unit Price (Excl. Tax):</span>
            <span id="resUnit" class="result-val unit-ex">0.0000</span>
        </div>
    </div>
</div>

<script>
// --- Visit Counter Logic ---
// Tracks the visits in the browser storage so it persists when they close and re-open the page.
let visits = localStorage.getItem('calculator_visits');
if (visits === null) {
    visits = 1;
} else {
    visits = parseInt(visits) + 1;
}
localStorage.setItem('calculator_visits', visits);
document.getElementById('visitCount').innerText = visits;


// --- Calculation Logic ---
function calculatePrice() {
    const totalIncTax = parseFloat(document.getElementById('totalIncTax').value);
    const quantity = parseFloat(document.getElementById('quantity').value);

    if (isNaN(totalIncTax) || isNaN(quantity)) {
        alert("Please enter valid numeric values.");
        return;
    }

    if (quantity <= 0) {
        alert("Quantity must be greater than zero.");
        return;
    }

    const taxRate = 0.05;
    const totalWithoutTax = totalIncTax / (1 + taxRate);
    const unitPriceWithoutTax = totalWithoutTax / quantity;

    // Fixed to exactly 4 decimal places (.toFixed(4))
    document.getElementById('resTotal').innerText = totalWithoutTax.toFixed(4);
    document.getElementById('resUnit').innerText = unitPriceWithoutTax.toFixed(4);
    
    document.getElementById('resultsSection').style.display = 'block';
}
</script>

</body>
</html>
